services:
  sqeez-postgres:
    image: postgres:18
    container_name: sqeez_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GHCR_OWNER}/sqeez-backend:latest
    restart: always
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network
    volumes:
      - backend-wwwroot:/app/wwwroot
      - backend-secure:/app/SecureStorage
      - backend-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      sqeez-postgres:
        condition: service_healthy

  frontend:
    image: ghcr.io/${GHCR_OWNER}/sqeez-frontend:latest
    restart: always
    environment:
      - NGINX_SERVER_NAME=${NGINX_SERVER_NAME:-sqeez.org}
      - NGINX_SSL_CERTIFICATE=${NGINX_SSL_CERTIFICATE:-/etc/letsencrypt/live/sqeez.org/fullchain.pem}
      - NGINX_SSL_CERTIFICATE_KEY=${NGINX_SSL_CERTIFICATE_KEY:-/etc/letsencrypt/live/sqeez.org/privkey.pem}
      - NGINX_BACKEND_URL=${NGINX_BACKEND_URL:-http://backend:8080}
      - NGINX_CLIENT_MAX_BODY_SIZE=${NGINX_CLIENT_MAX_BODY_SIZE:-100m}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${NGINX_CERTIFICATE_HOST_PATH:-/etc/letsencrypt}:/etc/letsencrypt:ro
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  backend-wwwroot:
  backend-secure:
  backend-keys:
