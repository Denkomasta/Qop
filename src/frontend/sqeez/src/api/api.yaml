components:
  schemas:
    AssignStudentsDto:
      required:
        - studentIds
      type: object
      properties:
        studentIds:
          type: array
          items:
            pattern: ^-?(?:0|[1-9]\d*)$
            type:
              - integer
              - string
            format: int64
    BadgeMetric:
      enum:
        - ScorePercentage
        - TotalScore
        - PerfectAnswersCount
        - TotalAttempts
    BadgeOperator:
      enum:
        - Equals
        - GreaterThan
        - GreaterThanOrEqual
        - LessThan
        - LessThanOrEqual
        - NotEquals
    CreateBadgeRuleDto:
      required:
        - metric
        - operator
        - targetValue
      type: object
      properties:
        metric:
          $ref: "#/components/schemas/BadgeMetric"
        operator:
          $ref: "#/components/schemas/BadgeOperator"
        targetValue:
          pattern: ^-?(?:0|[1-9]\d*)(?:\.\d+)?$
          type:
            - number
            - string
          format: double
    CreateMediaAssetDto:
      required:
        - locationUrl
        - mimeType
        - isPrivate
        - ownerId
      type: object
      properties:
        locationUrl:
          type: string
        mimeType:
          $ref: "#/components/schemas/MediaType"
        isPrivate:
          type: boolean
        ownerId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
        description:
          type:
            - "null"
            - string
    CreateQuizDto:
      required:
        - title
        - description
        - subjectId
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        subjectId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
        maxRetries:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
          default: 0
        publishDate:
          type:
            - "null"
            - string
          format: date-time
        closingDate:
          type:
            - "null"
            - string
          format: date-time
    CreateQuizOptionDto:
      required:
        - isCorrect
        - quizQuestionID
      type: object
      properties:
        isCorrect:
          type: boolean
        quizQuestionID:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
        text:
          type:
            - "null"
            - string
        isFreeText:
          type: boolean
          default: false
        mediaAssetId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int64
    CreateQuizQuestionDto:
      required:
        - title
        - difficulty
        - timeLimit
        - quizId
      type: object
      properties:
        title:
          type: string
        difficulty:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        timeLimit:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int32
        quizId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - integer
            - string
          format: int64
        mediaAssetId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int64
    CreateSchoolClassDto:
      required:
        - name
        - academicYear
        - section
        - teacherId
      type: object
      properties:
        name:
          type: string
        academicYear:
          type: string
        section:
          type: string
        teacherId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int64
    CreateSubjectDto:
      required:
        - name
        - code
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        description:
          type:
            - "null"
            - string
        startDate:
          type:
            - "null"
            - string
          format: date-time
        endDate:
          type:
            - "null"
            - string
          format: date-time
        teacherId:
          pattern: ^-?(?:0|[1-9]\d*)$
          type:
            - "null"
            - integer
            - string
          format: int64
        schoolClassId:
