version: '3.8'

services:
  sqeez-postgres:
    image: postgres:18
    container_name: sqeez_db
    restart: always
    env_file:
      - ./backend/Sqeez.Api/.env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend/Sqeez.Api
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./backend/Sqeez.Api/.env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
    networks:
      - app-network
    volumes:
      - backend-wwwroot:/app/wwwroot
      - backend-secure:/app/SecureStorage
      - backend-keys:/root/.aspnet/DataProtection-Keys
    depends_on:
      sqeez-postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "dotnet Sqeez.Api.dll seed && dotnet Sqeez.Api.dll"]

  frontend:
    build:
      context: ./frontend/sqeez
      dockerfile: Dockerfile
      args:
        - VITE_API_BASE_URL=/
        - VITE_PORT=80
    restart: always
    ports:
      - "80:80"
    networks:
      - app-network
    depends_on:
      - backend

networks:
  app-network:
    driver: bridge

volumes:
  pgdata:
  backend-wwwroot:
  backend-secure:
  backend-keys: