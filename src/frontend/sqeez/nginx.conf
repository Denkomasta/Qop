# 1. Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name sqeez.org;
    return 301 https://$host$request_uri;
}

# 2. The main HTTPS server
server {
    listen 443 ssl;
    server_name sqeez.org;

    # Point to the Let's Encrypt certificates
    ssl_certificate /etc/letsencrypt/live/sqeez.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sqeez.org/privkey.pem;

    # 1. Serve the React UI
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This catch-all is crucial for React Router to work properly
        try_files $uri $uri/ /index.html;
    }

    location /avatars/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    location /badges/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # 2. Reverse Proxy for the Backend API
    location /api/ {
        proxy_pass http://backend:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}