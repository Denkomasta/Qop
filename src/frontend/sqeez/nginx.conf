server {
    listen 80;

    # 1. Serve the React UI
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        # This catch-all is crucial for React Router to work properly
        try_files $uri $uri/ /index.html;
    }

    # 2. Reverse Proxy for the Backend API
    # Any request to yourdomain.com/api/... gets forwarded to the backend container
    location /api/ {
        # "backend" is the exact service name from docker-compose.yml
        # "8080" is the port the .NET 10 container exposes
        proxy_pass http://backend:8080;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection keep-alive;
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}