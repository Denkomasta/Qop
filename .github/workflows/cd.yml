name: Deploy to Hetzner

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend/Sqeez.Api
          file: ./src/backend/Sqeez.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/sqeez-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend/sqeez
          file: ./src/frontend/sqeez/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/sqeez-frontend:latest
          build-args: |
            VITE_API_BASE_URL=/
            VITE_PORT=80

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      DEPLOY_DIR: /root/Sqeez
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore Backend
        run: dotnet restore src/backend/Sqeez.Api/Sqeez.Api.csproj

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Generate Idempotent Migration Script
        run: |
          mkdir -p db-artifacts
          dotnet ef migrations script \
            --idempotent \
            --output db-artifacts/migrate.sql \
            --project src/backend/Sqeez.Api/Sqeez.Api.csproj

      - name: Ensure Deployment Directory Exists
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: DEPLOY_DIR
          script: |
            mkdir -p "$DEPLOY_DIR"

      - name: Copy Runtime Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "src/docker-compose.yml,db-artifacts/migrate.sql"
          target: "${{ env.DEPLOY_DIR }}"
          strip_components: 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,REPO_OWNER,DEPLOY_DIR
          script: |
            cd "$DEPLOY_DIR"
            export GHCR_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

            if [ ! -f .env ]; then
              echo "Missing .env in $DEPLOY_DIR. Create it on the server before deploying."
              exit 1
            fi

            POSTGRES_USER=$(grep -E '^POSTGRES_USER=' .env | cut -d '=' -f2-)
            POSTGRES_DB=$(grep -E '^POSTGRES_DB=' .env | cut -d '=' -f2-)
            POSTGRES_USER=${POSTGRES_USER:-postgres}
            POSTGRES_DB=${POSTGRES_DB:-postgres}

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

            docker compose --env-file .env pull
            docker compose --env-file .env up -d sqeez-postgres

            until docker exec sqeez_db pg_isready -U "$POSTGRES_USER"; do
              echo "Waiting for postgres..."
              sleep 2
            done

            cat ./migrate.sql | docker exec -i sqeez_db psql -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            rm ./migrate.sql

            docker compose --env-file .env up -d
            docker logout ghcr.io
