name: Deploy to Hetzner

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types:
      - completed
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }} 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase repository owner
        run: echo "REPO_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./src/backend/Sqeez.Api
          file: ./src/backend/Sqeez.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/sqeez-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./src/frontend/sqeez
          file: ./src/frontend/sqeez/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_OWNER }}/sqeez-frontend:latest
          build-args: |
            VITE_API_BASE_URL=/
            VITE_PORT=80

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          REPO_OWNER: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR,REPO_OWNER
          script: |
            cd /root/Sqeez/src
            
            # Pull the updated docker-compose.yml
            git pull origin main
            
            # Convert owner to lowercase for the compose file
            export GHCR_OWNER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')
            
            # Log in securely
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Pull pre-built images and run
            docker compose pull
            docker compose up -d
            
            # Log out
            docker logout ghcr.io